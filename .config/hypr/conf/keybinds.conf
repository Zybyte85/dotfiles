# --- Variables ---
# Sets "Windows" key as main modifier
$mainMod = SUPER
# Helps with controlling Noctalia
$ipc = qs -c noctalia-shell ipc call
# Set your apps here
$terminal = kitty
$fileManager = dolphin
$browser = brave
$editor = zeditor

# 1. Applications
bind = $mainMod, T, exec, $terminal #"Terminal"
bind = $mainMod, E, exec, $fileManager #"File manager"
bind = $mainMod, B, exec, $browser #"Browser"
bind = $mainMod, R, exec, $menu
bind = $mainMod, C, exec, $editor #"Text editor"

# 2. Window Management
bind = $mainMod, Q, killactive, #"Close focused window"
bind = $mainMod, M, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit #"Logout"
bind = $mainMod, F, togglefloating, #"Toggle floating"
bind = ,F11, fullscreen, #"Toggle fullscreen"
bind = $mainMod, left, movefocus, l #"Move focus left"
bind = $mainMod, right, movefocus, r #"Move focus right"
bind = $mainMod, up, movefocus, u #"Move focus up"
bind = $mainMod, down, movefocus, d #"Move focus down"

# 3. Shell
bind = $mainMod, SPACE, exec, $ipc launcher toggle #"Open launcher"
bind = $mainMod, N, exec, $ipc controlCenter toggle #"Open control center"
bind = $mainMod, comma, exec, $ipc settings toggle #"Open settings"
bind = $mainMod, V, exec, $ipc launcher clipboard #"Open clipboard history"
bind = $mainMod, period, exec, $ipc launcher emoji #"Open emoji picker"
bind = $mainMod CTRL, B, exec, $ipc bar toggle #"Toggle bar"
bind = $mainMod CTRL, D, exec, $ipc dock toggle #"Toggle dock"
bind = $mainMod SHIFT, K, exec, $ipc plugin:keybind-cheatsheet toggle #"Open keybind cheatsheet"
bindl = , XF86PowerOff, exec, $ipc sessionMenu toggle

bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, J, layoutmsg, togglesplit # dwindle

# 4. Screenshot
bind = , Print, exec, ~/.config/hypr/scripts/screenshot.sh #"Screenshot full screen"
bind = CTRL, Print, exec, ~/.config/hypr/scripts/screenshot.sh region #"Screenshot region"
bind = CTRL SHIFT, Print, exec, ~/.config/hypr/scripts/screenshot.sh window #"Screenshot active window"

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = , XF86AudioRaiseVolume, exec, $ipc volume increase
bindel = , XF86AudioLowerVolume, exec, $ipc volume decrease
bindl = , XF86AudioMute, exec, $ipc volume muteOutput
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = , XF86MonBrightnessUp, exec, $ipc brightness increase
bindel = , XF86MonBrightnessDown, exec, $ipc brightness decrease

# Smaller adjustments with shift
bindel = SHIFT,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 1%+
bindel = SHIFT,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 1%-
bindel = SHIFT,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 1%+
bindel = SHIFT,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 1%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

# Handle laptop lid
bindl = , switch:Lid Switch, exec, ~/.config/hypr/scripts/clamshell.sh
